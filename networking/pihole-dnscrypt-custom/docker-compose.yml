---
services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PIHOLE_WEB_PORT:-80}:80/tcp"
    environment:
      TZ: ${TZ}
      FTLCONF_webserver_api_password: ${FTLCONF_webserver_api_password}
      FTLCONF_dns_upstreams: dnscrypt-proxy#5053
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_revServers: ${FTLCONF_dns_revServers}
      TEMPERATUREUNIT: ${TEMPERATUREUNIT:-f}
    volumes:
      - etc-pihole:/etc/pihole
      - etc-dnsmasq.d:/etc/dnsmasq.d
    depends_on:
      - dnscrypt-proxy
    healthcheck:
      test: [ "CMD", "dig", "@127.0.0.1", "pi.hole", "+short" ]
      interval: 30s
      timeout: 10s
      retries: 3
    # Uncomment if using pihole DHCP
    # cap_add:
    #   - NET_ADMIN
    # Uncomment if using a reverse proxy
    # networks:
    #   - proxy

  dnscrypt-proxy:
    image: klutchell/dnscrypt-proxy:latest
    container_name: dnscrypt-proxy
    restart: unless-stopped
    configs:
      - source: dnscrypt-proxy-toml
        target: /config/dnscrypt-proxy.toml

# IMPORTANT: Update server_names and stamp below before deploying.
# Find a public server: https://dnscrypt.info/public-servers/
# Generate a stamp for your own DoH provider: https://dnscrypt.info/stamps/
configs:
  dnscrypt-proxy-toml:
    content: |
      listen_addresses = ['0.0.0.0:5053']
      server_names = ['yourservername']
      [static]
        [static.'yourservername']
        stamp = 'sdns://yourstamphere'

volumes:
  etc-pihole:
  etc-dnsmasq.d:

    # Uncomment if using a reverse proxy (shared external network)
    # networks:
    #   proxy:
    #     external: true
